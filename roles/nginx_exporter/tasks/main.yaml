---
  - name: Install Nginx exporter
    ansible.builtin.apt:
      name: prometheus-nginx-exporter

  - name: Copy exporter to sites-enabled
    ansible.builtin.template:
      src: exporter.j2
      dest: /etc/nginx/sites-enabled/exporter
    notify: 
      - Restart nginx
      - Restart nginx exporter
      - Reload daemons

  - name: Enable nginx exporter
    service:
      name: prometheus-nginx-exporter
      state: started
      enabled: yes