---
  - name: Create A records
    community.general.nsupdate:
      key_name: "update.key"
      key_algorithm: "hmac-sha256"
      key_secret: "{{ dns_update_key }}"
      server: "localhost"
      zone: "{{ domain_name }}"
      record: "{{ item.key }}"
      type: "A"
      value: "{{ item.value }}"
    loop: "{{ dns_a_records | dict2items }}"

  - name: Create CNAME records
    community.general.nsupdate:
      key_name: "update.key"
      key_algorithm: "hmac-sha256"
      key_secret: "{{ dns_update_key }}"
      server: "localhost"
      zone: "{{ domain_name }}"
      record: "{{ item.key }}"
      type: "CNAME"
      value: "{{ item.value }}"
    loop: "{{ dns_cname_records | dict2items }}"
    run_once: True
