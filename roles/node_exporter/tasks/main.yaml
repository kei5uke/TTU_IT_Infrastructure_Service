
- name: Install Node Exporters
  ansible.builtin.get_url:
    url: https://github.com/prometheus/node_exporter/releases/download/v1.2.2/node_exporter-1.2.2.darwin-amd64.tar.gz
    dest: /etc/node_exporter.tar.gz

- name: Unzip Node Exporters
  ansible.builtin.unarchive:
    src: /etc/node_exporter.tar.gz
    dest: /etc/node_exporter
    remote_src: yes
