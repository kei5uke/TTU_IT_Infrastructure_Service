---
  - name: Install config
    ansible.builtin.template:
      src: ../templates/my.cnf.j2
      dest: /var/lib/prometheus/.my.cnf
      owner: prometheus
      group: prometheus
      mode: 0644
    notify: Restart mysql exporter
    no_log: True

  - name: mysqld-arg tempalte
    template:
      src: ../templates/prometheus-mysqld-exporter
      dest: /etc/default/prometheus-mysqld-exporter
    notify: Restart mysql exporter

  - name: Install mysql exporter
    ansible.builtin.apt:
      name: prometheus-mysqld-exporter
    register: mysqld_exporter_installed

  - name: 15 seconds
    pause:
      seconds: 15
    when: mysqld_exporter_installed.changed

  - name: Enable mysql mysql exporter
    ansible.builtin.service:
      name: prometheus-mysqld-exporter
      state: started
      enabled: yes