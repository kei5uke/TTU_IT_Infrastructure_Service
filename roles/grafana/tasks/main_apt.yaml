---
  - name: Add grafana apt key
    ansible.builtin.apt_key:
      url: https://packages.grafana.com/gpg.key

  - name: Add grafana repository
    ansible.builtin.apt_repository:
      repo: deb https://packages.grafana.com/oss/deb stable main

  - name: Install grafana 
    ansible.builtin.apt:
      name: grafana 
    notify: 
      - install admin key

  - name: grafana config
    template:
      src: ../templates/grafana.ini.j2
      dest: /etc/grafana/grafana.ini
    notify:
      - Restart grafana

  - name: start and enable grafana
    service:
      name: grafana-server
      state: started
      enabled: yes

  - name: grafana dashboard dir
    file:
      path: /var/lib/grafana/dashboards
      state: directory
    notify:
      - Restart grafana

  - name: grafana dashboard setting
    copy:
      src: ../files/main.json
      dest: /var/lib/grafana/dashboards/main.json
    notify:
      - Restart grafana

  - name: copy main dashboard
    copy:
      src: main.json
      dest: /var/lib/grafana/dashboards/main.json

  - name: copy MySQL dashboard
    copy:
      src: mysql.json
      dest: /var/lib/grafana/dashboards/mysql.json
    notify:
      - Restart grafana

  - name: copy grafana datasource
    template:
      src: ds.yaml
      dest: /etc/grafana/provisioning/datasources/sample.yaml
    notify:
      - Restart grafana