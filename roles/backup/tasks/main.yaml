---
  - name: Create user "backup"
    ansible.builtin.user: 
      name: backup 
      home: /home/backup
      shell: /bin/bash
      generate_ssh_key: yes 
      ssh_key_bits: 2048 
      ssh_key_file: .ssh/id_rsa
    
  - name: Add group "backup"
    group:
      name: backup
      state: present
  
  - name: Create restore/.ssh directory 
    ansible.builtin.file: 
      path: /home/backup/{{ item }}
      state: directory 
      mode: 0755 
      owner: backup 
      group: backup 
    loop:
      - restore
      - .ssh
    
  - name: Install Duplicity
    ansible.builtin.apt: 
      name: duplicity 

  - name: Copy known_hosts
    ansible.builtin.template: 
      src: ../templates/known_hosts.j2
      dest: /home/backup/.ssh/known_hosts 
      mode: 0755
      owner: root
      group: root 

  - name: Enable cron
    service:
      name: cron
      state: started
      enabled: yes