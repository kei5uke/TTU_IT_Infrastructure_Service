---
  - name: Ansible connection test
    hosts: all
    roles:
      - test_connection

  - name: Collect info about all VMs
    hosts: all
    become: yes
    gather_facts: yes
    tasks:
      - setup:

  - name: Init
    hosts: all
    become: yes
    gather_facts: no
    roles:
      - init
      - backup
      - node_exporter
      - rsyslog

  - name: DNS server
    hosts: dns_servers
    become: yes
    gather_facts: yes
    roles:
      - bind

  - name: DNS resolve
    hosts: all
    become: yes
    gather_facts: yes
    roles:
      - dns

  - name: DNS records 
    hosts: dns_master 
    become: yes 
    gather_facts: yes 
    roles: 
      - dns_records

  - name: Bind exporter 
    hosts: dns_servers 
    become: yes 
    gather_facts: no 
    roles:
     - bind_exporter

  - name: Database server
    hosts: db_servers
    become: yes
    gather_facts: no
    roles:
      - mysql
      - mysql_exporter
      - mysql_backup

  - name: Web server
    hosts: web_servers
    become: yes
    gather_facts: yes
    roles:
        - ssl
        - docker
        - agama
        #- uwsgi
        - prometheus
      
  - name: Prometheus 
    hosts: prometheus
    become: yes 
    gather_facts: no 
    roles:
      - prometheus

  - name: HAproxy 
    hosts: haproxy 
    become: yes 
    gather_facts: yes
    roles:
      - haproxy
      - keepalived

  - name: Nginx
    hosts: all
    become: yes
    gather_facts: no
    roles:
      - nginx
      - nginx_exporter

  - name: influxdb 
    hosts: influxdb 
    become: yes 
    gather_facts: no 
    roles: 
      - influxdb 
      - pinger 
      - influxdb_exporter
      - influxdb_backup

  - name: grafana
    hosts: grafana
    become: yes
    gather_facts: no
    roles:
      - docker
      - grafana
