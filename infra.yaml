---
  - name: Ansible connection test
    hosts: all
    roles:
      - test_connection

  - name: Collect info about all VMs
    hosts: all
    become: yes
    gather_facts: yes
    tasks:
      - setup:

  - name: Init
    hosts: all
    become: yes
    gather_facts: no
    roles:
      - init
      - node_exporter

  - name: Database server
    hosts: db_servers
    become: yes
    gather_facts: no
    roles:
      - mysql
      - mysql_exporter

  - name: DNS server
    hosts: dns_servers
    become: yes
    gather_facts: no
    roles:
      - bind

  - name: DNS setting
    hosts: all
    become: yes
    gather_facts: no
    roles:
      - dns

  - name: Bind exporter 
    hosts: dns_servers 
    become: yes 
    gather_facts: no 
    roles:
     - bind_exporter

  - name: Web server
    hosts: web_servers
    become: yes
    gather_facts: no
    roles:
        - agama
        - uwsgi
        - prometheus

  - name: Nginx
    hosts: all
    become: yes
    gather_facts: no
    roles:
      - nginx
      - nginx_exporter

  - name: influxdb 
    hosts: influxdb 
    become: yes 
    gather_facts: no 
    roles: 
      - influxdb 
      - pinger 
      - influxdb_exporter

  - name: grafana
    hosts: grafana
    become: yes
    gather_facts: no
    roles:
      - grafana
