---
  - name: Ansible connection test
    hosts: all
    roles:
      - test_connection

  - name: Init
    hosts: all
    become: yes
    roles: 
      - init

  - name: Database server
    hosts: db_servers
    become: yes
    roles:
      - mysql

  - name: DNS server
    hosts: dns_servers
    become: yes
    roles: 
      - bind

  - name: DNS setting
    hosts: all
    become: yes
    roles:
      - dns

  - name: Web server
    hosts: web_servers
    become: yes
    roles:
      - agama
      - uwsgi
      - nginx
      
